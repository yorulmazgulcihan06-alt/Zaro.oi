<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZARO.IO - Cyber Arena</title>
    <style>
        :root {
            --zaro-neon: #00ff88;
            --zaro-purple: #7000ff;
            --zaro-danger: #ff3e3e;
            --dark-bg: #020205;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--dark-bg); 
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            color: white; user-select: none; touch-action: none;
        }

        #game-canvas { display: block; width: 100%; height: 100%; }

        /* Lobi */
        #ui-overlay { position: absolute; inset: 0; z-index: 100; pointer-events: none; }
        #lobby { 
            position: absolute; inset: 0; background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: all; transition: opacity 0.5s;
        }

        .zaro-card {
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(20px);
            border: 2px solid var(--zaro-neon);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            width: 340px;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.15);
        }

        h1 { 
            font-size: 3rem; margin: 0 0 10px; letter-spacing: 8px; 
            background: linear-gradient(to bottom, #fff, var(--zaro-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline { color: #666; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 30px; text-transform: uppercase; }

        input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333;
            background: rgba(255,255,255,0.05); color: white; text-align: center; outline: none; 
            box-sizing: border-box; font-size: 1rem; margin-bottom: 20px;
        }

        .device-toggle { display: flex; gap: 10px; margin-bottom: 25px; }
        .dev-btn {
            flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #222;
            background: #111; color: #555; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .dev-btn.selected { border-color: var(--zaro-purple); color: white; background: rgba(112, 0, 255, 0.2); }

        #play-now {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            background: linear-gradient(90deg, var(--zaro-neon), var(--zaro-purple));
            color: white; font-weight: 900; font-size: 1.2rem; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }

        /* HUD */
        #hud { display: none; position: absolute; inset: 0; pointer-events: none; }
        
        #radar {
            position: absolute; top: 25px; right: 25px; width: 160px; height: 160px;
            background: rgba(0,0,0,0.8); border: 2px solid var(--zaro-neon); border-radius: 15px;
            overflow: hidden;
        }
        #radar-canvas { width: 100%; height: 100%; }

        .player-info { position: absolute; top: 25px; left: 25px; }
        .zaro-hp-box { width: 220px; height: 12px; background: #111; border-radius: 6px; border: 1px solid #333; overflow: hidden; margin-top: 5px; }
        .zaro-hp-fill { height: 100%; width: 100%; background: var(--zaro-neon); box-shadow: 0 0 10px var(--zaro-neon); transition: 0.3s; }

        .skill-bar { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 20px; pointer-events: all; }
        .skill-btn {
            width: 70px; height: 70px; border-radius: 18px; background: rgba(0,0,0,0.85);
            border: 2px solid var(--zaro-purple); color: white; display: flex; align-items: center;
            justify-content: center; font-size: 10px; flex-direction: column; position: relative;
        }
        .skill-cooldown { position: absolute; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); height: 0%; transition: height 0.1s; border-radius: 16px; }

        #joystick-zone {
            position: absolute; bottom: 60px; left: 60px; width: 140px; height: 140px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; 
            display: none; pointer-events: all;
        }
        #joystick-head {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
            background: var(--zaro-neon); border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.5;
        }

        #fs-trigger { position: absolute; top: 15px; right: 200px; background: none; border: none; color: #444; cursor: pointer; pointer-events: all; font-size: 20px; }
    </style>
</head>
<body>

    <button id="fs-trigger" onclick="toggleFull()">⛶</button>

    <div id="ui-overlay">
        <div id="lobby">
            <div class="zaro-card">
                <h1>ZARO.IO</h1>
                <p class="tagline">World Update</p>
                <input type="text" id="zaro-name" placeholder="PİLOT İSMİ..." maxlength="12">
                <div class="device-toggle">
                    <button class="dev-btn selected" id="set-pc">DESKTOP</button>
                    <button class="dev-btn" id="set-mob">MOBILE</button>
                </div>
                <button id="play-now" disabled>YÜKLENİYOR...</button>
            </div>
        </div>

        <div id="hud">
            <div class="player-info">
                <div id="display-name" style="font-weight: 900; letter-spacing: 2px; color: #fff;">PİLOT</div>
                <div class="zaro-hp-box"><div class="zaro-hp-fill" id="hp-bar"></div></div>
                <div id="display-score" style="margin-top: 8px; font-size: 12px; color: var(--zaro-neon);">PUAN: 0</div>
            </div>

            <div id="radar">
                <canvas id="radar-canvas"></canvas>
            </div>

            <div class="skill-bar">
                <div class="skill-btn" id="btn-dash">
                    <span style="font-weight: bold;">DASH</span>
                    <span class="key-hint" style="font-size: 8px; opacity: 0.5;">(L-SHIFT)</span>
                    <div class="skill-cooldown" id="cd-dash"></div>
                </div>
                <div class="skill-btn" id="btn-bomb">
                    <span style="font-weight: bold;">BOMBA</span>
                    <span class="key-hint" style="font-size: 8px; opacity: 0.5;">(E / Q)</span>
                    <div class="skill-cooldown" id="cd-bomb"></div>
                </div>
            </div>

            <div id="joystick-zone">
                <div id="joystick-head"></div>
            </div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'zaro-io-v2';
        const firebaseConfig = JSON.parse(__firebase_config);

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let scene, camera, renderer, me, myId;
        let isMobile = false;
        let activeState = 'LOBBY';
        const others = {};
        const shots = [];
        const press = {};
        
        const radCanvas = document.getElementById('radar-canvas');
        const radCtx = radCanvas.getContext('2d');

        function startEngine() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.04);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;

            // --- GÖKYÜZÜ (YILDIZLAR) ---
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<3000; i++) {
                starPos.push((Math.random()-0.5)*1000, (Math.random()*500), (Math.random()-0.5)*1000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // --- IŞIKLANDIRMA ---
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            const mainLight = new THREE.DirectionalLight(0x7000ff, 0.8);
            mainLight.position.set(50, 100, 50);
            mainLight.castShadow = true;
            scene.add(mainLight);

            const neonLight = new THREE.PointLight(0x00ff88, 1, 100);
            neonLight.position.set(0, 10, 0);
            scene.add(neonLight);

            // Zemin
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: 0x050505 }));
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            const grid = new THREE.GridHelper(500, 100, 0x00ff88, 0x111111);
            grid.position.y = 0.01;
            scene.add(grid);

            // --- EVLER VE KULELER ---
            const createStructure = (x, z, type) => {
                const group = new THREE.Group();
                if(type === 'house') {
                    const base = new THREE.Mesh(new THREE.BoxGeometry(10, 15, 10), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
                    base.position.y = 7.5;
                    const neonWindow = new THREE.Mesh(new THREE.BoxGeometry(10.2, 2, 2), new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88 }));
                    neonWindow.position.y = 10;
                    group.add(base, neonWindow);
                } else {
                    // KULE
                    const tower = new THREE.Mesh(new THREE.CylinderGeometry(2, 3, 20, 8), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                    tower.position.y = 10;
                    const top = new THREE.Mesh(new THREE.SphereGeometry(2.5), new THREE.MeshStandardMaterial({ color: 0x7000ff, emissive: 0x7000ff }));
                    top.position.y = 20;
                    group.add(tower, top);
                }
                group.position.set(x, 0, z);
                scene.add(group);
            };

            for(let i=0; i<15; i++) createStructure(Math.random()*300-150, Math.random()*300-150, 'house');
            for(let i=0; i<10; i++) createStructure(Math.random()*300-150, Math.random()*300-150, 'tower');

            // --- YERDEKİ EŞYALAR (SİLAH VE SARGI BEZİ) ---
            const createLoot = (x, z, isMed) => {
                const group = new THREE.Group();
                if(isMed) {
                    // SARGI BEZİ (İlk Yardım Çantası gibi)
                    const box = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                    const cross = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.3, 0.3), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
                    const cross2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.1, 0.3), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
                    group.add(box, cross, cross2);
                } else {
                    // SİLAH (Basit bir lazer tüfeği gibi)
                    const gun = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 2), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                    const glow = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.1, 1.5), new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88 }));
                    group.add(gun, glow);
                }
                group.position.set(x, 0.5, z);
                scene.add(group);
                // Döndürme efekti için referans
                group.userData.isLoot = true;
            };

            for(let i=0; i<20; i++) createLoot(Math.random()*300-150, Math.random()*300-150, i%2===0);

            loop();
        }

        function createZaroModel(isEnemy = false) {
            const group = new THREE.Group();
            const mainColor = isEnemy ? 0x7000ff : 0x00ff88;
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.4, 1), new THREE.MeshStandardMaterial({ color: mainColor }));
            body.position.y = 1.2;
            group.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({ color: mainColor }));
            head.position.y = 2.4;
            group.add(head);
            const cannon = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 1.8), new THREE.MeshStandardMaterial({ color: 0x000000 }));
            cannon.position.set(0.7, 1.3, 0.8);
            group.add(cannon);
            return group;
        }

        const joyState = { active: false, x: 0, y: 0 };
        function bindInputs() {
            window.addEventListener('keydown', e => press[e.code] = true);
            window.addEventListener('keyup', e => press[e.code] = false);
            window.addEventListener('mousedown', () => { if(activeState === 'PLAY' && !isMobile) shoot(); });
            const jZone = document.getElementById('joystick-zone');
            const jHead = document.getElementById('joystick-head');
            jZone.addEventListener('touchstart', (e) => { e.preventDefault(); joyState.active = true; });
            jZone.addEventListener('touchmove', e => {
                e.preventDefault(); if(!joyState.active) return;
                const t = e.touches[0]; const r = jZone.getBoundingClientRect();
                const cx = r.left + r.width/2; const cy = r.top + r.height/2;
                let dx = t.clientX - cx; let dy = t.clientY - cy;
                const d = Math.min(Math.sqrt(dx*dx + dy*dy), 60); const a = Math.atan2(dy, dx);
                joyState.x = Math.cos(a) * (d/60); joyState.y = Math.sin(a) * (d/60);
                jHead.style.transform = `translate(calc(-50% + ${Math.cos(a)*d}px), calc(-50% + ${Math.sin(a)*d}px))`;
            });
            jZone.addEventListener('touchend', () => { joyState.active = false; joyState.x = 0; joyState.y = 0; jHead.style.transform = `translate(-50%, -50%)`; });
            document.getElementById('btn-dash').onclick = () => { if(activeState==='PLAY') dash(); };
            document.getElementById('btn-bomb').onclick = () => { if(activeState==='PLAY') bomb(); };
        }

        function shoot() {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshBasicMaterial({ color: 0x00ff88 }));
            b.position.copy(me.position); b.position.y = 1.3;
            const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(me.quaternion);
            scene.add(b); shots.push({ mesh: b, dir, ttl: 80 });
        }

        function dash() {
            if(dashLocked) return; dashLocked = true;
            const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(me.quaternion);
            me.position.addScaledVector(dir, 12);
            document.getElementById('cd-dash').style.height = '100%';
            setTimeout(() => { dashLocked = false; document.getElementById('cd-dash').style.height = '0%'; }, 2500);
        }

        function bomb() {
            if(bombLocked) return; bombLocked = true;
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.8), new THREE.MeshStandardMaterial({ color: 0x7000ff, emissive: 0x7000ff }));
            b.position.copy(me.position); scene.add(b);
            setTimeout(() => scene.remove(b), 2000);
            document.getElementById('cd-bomb').style.height = '100%';
            setTimeout(() => { bombLocked = false; document.getElementById('cd-bomb').style.height = '0%'; }, 6000);
        }

        const initFirebase = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
            else await signInAnonymously(auth);
        };
        onAuthStateChanged(auth, u => { if(u) { myId = u.uid; document.getElementById('play-now').disabled = false; document.getElementById('play-now').innerText = "SAVAŞA KATIL"; }});
        initFirebase();

        document.getElementById('play-now').onclick = () => {
            const n = document.getElementById('zaro-name').value || "PİLOT";
            document.getElementById('display-name').innerText = n;
            document.getElementById('lobby').style.opacity = '0';
            setTimeout(() => document.getElementById('lobby').style.display = 'none', 500);
            document.getElementById('hud').style.display = 'block';
            me = createZaroModel(false); scene.add(me); activeState = 'PLAY';
            if(isMobile) document.getElementById('joystick-zone').style.display = 'block';
            
            const playersCol = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            onSnapshot(playersCol, (s) => {
                s.docChanges().forEach(c => {
                    const id = c.doc.id; const d = c.doc.data();
                    if(id === myId) return;
                    if(c.type === 'added' || c.type === 'modified') {
                        if(!others[id]) { others[id] = { mesh: createZaroModel(true) }; scene.add(others[id].mesh); }
                        others[id].mesh.position.set(d.x, 0, d.z); others[id].mesh.rotation.y = d.r;
                    } else if(c.type === 'removed' && others[id]) { scene.remove(others[id].mesh); delete others[id]; }
                });
            });
        };

        document.getElementById('set-pc').onclick = () => { isMobile = false; document.getElementById('set-pc').classList.add('selected'); document.getElementById('set-mob').classList.remove('selected'); };
        document.getElementById('set-mob').onclick = () => { isMobile = true; document.getElementById('set-mob').classList.add('selected'); document.getElementById('set-pc').classList.remove('selected'); };

        let dashLocked = false, bombLocked = false;

        function loop() {
            requestAnimationFrame(loop);
            if(activeState === 'PLAY' && me) {
                if(isMobile) {
                    me.position.x += joyState.x * 0.25; me.position.z += joyState.y * 0.25;
                    if(joyState.x !== 0 || joyState.y !== 0) me.rotation.y = Math.atan2(joyState.x, joyState.y);
                } else {
                    if(press['KeyW']) { me.position.z -= 0.25; me.rotation.y = Math.PI; }
                    if(press['KeyS']) { me.position.z += 0.25; me.rotation.y = 0; }
                    if(press['KeyA']) { me.position.x -= 0.25; me.rotation.y = -Math.PI/2; }
                    if(press['KeyD']) { me.position.x += 0.25; me.rotation.y = Math.PI/2; }
                    if(press['ShiftLeft']) dash();
                    if(press['KeyE'] || press['KeyQ']) bomb();
                }
                camera.position.lerp(new THREE.Vector3(me.position.x, 16, me.position.z + 18), 0.08);
                camera.lookAt(me.position);
                if(Math.random() > 0.9 && myId) {
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', myId), { x: me.position.x, z: me.position.z, r: me.rotation.y });
                }
                drawRadar();
            }

            // Loot Döndürme
            scene.children.forEach(c => {
                if(c.userData.isLoot) c.rotation.y += 0.02;
            });

            shots.forEach((s, i) => {
                s.mesh.position.addScaledVector(s.dir, 0.7); s.ttl--;
                if(s.ttl <= 0) { scene.remove(s.mesh); shots.splice(i, 1); }
            });
            renderer.render(scene, camera);
        }

        function drawRadar() {
            radCtx.clearRect(0,0,160,160); radCtx.fillStyle = "#00ff88";
            radCtx.beginPath(); radCtx.arc(80, 80, 5, 0, Math.PI*2); radCtx.fill();
            radCtx.fillStyle = "#7000ff";
            Object.values(others).forEach(e => {
                const dx = (e.mesh.position.x - me.position.x) * 1.2; const dz = (e.mesh.position.z - me.position.z) * 1.2;
                radCtx.beginPath(); radCtx.arc(80 + dx, 80 + dz, 4, 0, Math.PI*2); radCtx.fill();
            });
        }

        window.toggleFull = () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        startEngine(); bindInputs();
    </script>
</body>
</html>
