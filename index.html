    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // --- SENİN FİREBASE BİLGİLERİN ---
        const firebaseConfig = {
          apiKey: "AIzaSyBSkMiVSxFwXmJLcSPxrAWu-bBoImAgrzo",
          authDomain: "voxel-feb43.firebaseapp.com",
          projectId: "voxel-feb43",
          storageBucket: "voxel-feb43.firebasestorage.app",
          messagingSenderId: "604626773313",
          appId: "1:604626773313:web:6e855ff7191a2612c76dc0",
          measurementId: "G-V19MG8VRC2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- DEĞİŞKENLER ---
        let scene, camera, renderer, localPlayer;
        const remotePlayers = {};
        const projectiles = [];
        let gameState = 'LOBBY';
        let userId = null;
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        const playerState = {
            name: '',
            x: 0, z: 0, rot: 0,
            health: 100, score: 0,
            color: Math.random() * 0xffffff,
            lastUpdate: 0
        };

        const inputs = { w: false, a: false, s: false, d: false, shooting: false };
        const joysticks = { move: { x: 0, y: 0 }, aim: { x: 0, y: 0 } };

        // --- TAM EKRAN FONKSİYONU ---
        window.toggleFullScreen = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            } else {
                document.exitFullscreen();
            }
        };

        // --- THREE.JS BAŞLATMA ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            scene.fog = new THREE.Fog(0x0f172a, 20, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 10);
            light.castShadow = true;
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshStandardMaterial({ color: 0x1e293b })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const grid = new THREE.GridHelper(200, 50, 0x334155, 0x1e293b);
            scene.add(grid);

            window.addEventListener('resize', onResize);
            setupControls();
            animate();
        }

        function createPlayerMesh(color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({ color }));
            body.position.y = 0.75;
            body.castShadow = true;
            group.add(body);

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({ color }));
            head.position.y = 1.9;
            group.add(head);

            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 1.2), new THREE.MeshStandardMaterial({ color: 0x334155 }));
            gun.position.set(0.6, 1.2, 0.8);
            group.add(gun);

            return group;
        }

        // --- KONTROLLER ---
        function setupControls() {
            window.addEventListener('keydown', e => { if(e.code === 'KeyW') inputs.w = true; if(e.code === 'KeyS') inputs.s = true; if(e.code === 'KeyA') inputs.a = true; if(e.code === 'KeyD') inputs.d = true; });
            window.addEventListener('keyup', e => { if(e.code === 'KeyW') inputs.w = false; if(e.code === 'KeyS') inputs.s = false; if(e.code === 'KeyA') inputs.a = false; if(e.code === 'KeyD') inputs.d = false; });
            window.addEventListener('mousedown', () => inputs.shooting = true);
            window.addEventListener('mouseup', () => inputs.shooting = false);

            if(isMobile) {
                setupJoystick('move-zone', 'move-stick', (x, y) => { joysticks.move.x = x; joysticks.move.y = y; });
                setupJoystick('aim-zone', 'aim-stick', (x, y) => { 
                    joysticks.aim.x = x; joysticks.aim.y = y; 
                    inputs.shooting = (Math.abs(x) > 0.1 || Math.abs(y) > 0.1);
                });
            }
        }

        function setupJoystick(zoneId, stickId, callback) {
            const zone = document.getElementById(zoneId);
            const stick = document.getElementById(stickId);
            zone.addEventListener('touchmove', e => {
                const touch = e.touches[0];
                const rect = zone.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                const angle = Math.atan2(dy, dx);
                dx = Math.cos(angle) * dist;
                dy = Math.sin(angle) * dist;
                stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                callback(dx / 50, dy / 50);
            });
            zone.addEventListener('touchend', () => {
                stick.style.transform = `translate(-50%, -50%)`;
                callback(0, 0);
            });
        }

        // --- MULTIPLAYER ---
        async function startMultiplayer() {
            const nameInput = document.getElementById('username').value.trim();
            playerState.name = nameInput || "Oyuncu_" + Math.floor(Math.random()*100);
            
            userId = auth.currentUser.uid;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            if(isMobile) document.getElementById('mobile-controls').style.display = 'block';

            localPlayer = createPlayerMesh(playerState.color);
            scene.add(localPlayer);
            gameState = 'PLAYING';

            // Oyuncu dinleme
            onSnapshot(collection(db, "players"), (snap) => {
                snap.docChanges().forEach(change => {
                    const id = change.doc.id;
                    const data = change.doc.data();
                    if(id === userId) return;

                    if(change.type === 'added' || change.type === 'modified') {
                        if(!remotePlayers[id]) {
                            remotePlayers[id] = { mesh: createPlayerMesh(data.color), data };
                            scene.add(remotePlayers[id].mesh);
                        }
                        remotePlayers[id].targetPos = new THREE.Vector3(data.x, 0, data.z);
                        remotePlayers[id].targetRot = data.rot;
                        remotePlayers[id].data = data;
                    } else if (change.type === 'removed') {
                        if(remotePlayers[id]) {
                            scene.remove(remotePlayers[id].mesh);
                            delete remotePlayers[id];
                        }
                    }
                });
                updateLeaderboard();
            });

            // Mermi dinleme
            onSnapshot(collection(db, "events"), (snap) => {
                snap.docChanges().forEach(change => {
                    if(change.type === 'added') {
                        const data = change.doc.data();
                        if(data.owner !== userId && Date.now() - data.t < 1000) {
                            spawnBullet(data.x, data.z, data.rot, data.owner);
                        }
                    }
                });
            });
        }

        function updateLeaderboard() {
            const list = Object.values(remotePlayers).map(p => p.data);
            list.push({ name: playerState.name, score: playerState.score });
            list.sort((a,b) => b.score - a.score);
            document.getElementById('lb-data').innerHTML = list.slice(0,5).map(i => `<div>${i.name}: ${i.score}</div>`).join('');
        }

        // --- MERMİ SİSTEMİ ---
        function spawnBullet(x, z, rot, owner) {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            b.position.set(x, 1.2, z);
            scene.add(b);
            projectiles.push({ mesh: b, vx: Math.sin(rot)*0.8, vz: Math.cos(rot)*0.8, owner, t: Date.now() });
        }

        // --- OYUN DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);
            if(gameState === 'PLAYING') {
                // Hareket
                let dx = 0, dz = 0;
                if(isMobile) { dx = joysticks.move.x * 0.2; dz = joysticks.move.y * 0.2; }
                else {
                    if(inputs.w) dz -= 0.2; if(inputs.s) dz += 0.2;
                    if(inputs.a) dx -= 0.2; if(inputs.d) dx += 0.2;
                }
                localPlayer.position.x += dx;
                localPlayer.position.z += dz;

                // Rotasyon
                if(isMobile) {
                    if(Math.abs(joysticks.aim.x) > 0.1) localPlayer.rotation.y = Math.atan2(joysticks.aim.x, joysticks.aim.y);
                } else {
                    localPlayer.rotation.y += (inputs.a ? 0.05 : 0) - (inputs.d ? 0.05 : 0);
                }

                // Ateş
                if(inputs.shooting && Date.now() - playerState.lastShot > 200) {
                    spawnBullet(localPlayer.position.x, localPlayer.position.z, localPlayer.rotation.y, userId);
                    setDoc(doc(collection(db, "events")), { x: localPlayer.position.x, z: localPlayer.position.z, rot: localPlayer.rotation.y, owner: userId, t: Date.now() });
                    playerState.lastShot = Date.now();
                }

                // Kamera
                camera.position.set(localPlayer.position.x, 15, localPlayer.position.z + 10);
                camera.lookAt(localPlayer.position);

                // Firebase Sync
                if(Date.now() - playerState.lastUpdate > 50) {
                    setDoc(doc(db, "players", userId), { 
                        name: playerState.name, x: localPlayer.position.x, z: localPlayer.position.z, 
                        rot: localPlayer.rotation.y, color: playerState.color, score: playerState.score, t: Date.now()
                    });
                    playerState.lastUpdate = Date.now();
                }

                document.getElementById('hp-fill').style.width = playerState.health + '%';
            }

            // Remote LERP
            Object.values(remotePlayers).forEach(p => {
                if(p.targetPos) p.mesh.position.lerp(p.targetPos, 0.2);
                p.mesh.rotation.y = p.targetRot;
            });

            // Projectiles
            for(let i = projectiles.length-1; i>=0; i--) {
                const p = projectiles[i];
                p.mesh.position.x += p.vx;
                p.mesh.position.z += p.vz;
                
                if(p.owner !== userId && p.mesh.position.distanceTo(localPlayer.position) < 1.5) {
                    playerState.health -= 10;
                    scene.remove(p.mesh);
                    projectiles.splice(i,1);
                    if(playerState.health <= 0) {
                        gameState = 'DEAD';
                        document.getElementById('respawn-screen').style.display = 'flex';
                    }
                    continue;
                }

                if(Date.now() - p.t > 2000) {
                    scene.remove(p.mesh);
                    projectiles.splice(i,1);
                }
            }

            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- BAŞLATMA ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('start-btn').disabled = false;
                document.getElementById('start-btn').innerText = "OYUNA GİR";
                document.getElementById('start-btn').onclick = startMultiplayer;
            } else {
                signInAnonymously(auth);
            }
        });

        init();
    </script>
</body>
</html>
