<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voxel Arena 3D Multiplayer</title>
    <style>
        :root {
            --primary: #4f46e5;
            --danger: #ef4444;
            --dark: #0f172a;
            --text: #f8fafc;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--dark);
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
            user-select: none;
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* Lobi Ekranı */
        #lobby {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(0,0,0,0.98));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: all;
            z-index: 100;
        }

        /* Tam Ekran Butonu */
        #fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .lobby-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 3rem 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .lobby-card h1 {
            color: var(--text);
            font-size: 2.5rem;
            margin: 0 0 0.5rem 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(79, 70, 229, 0.5);
        }

        .lobby-card p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 1.1rem;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .play-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .play-btn:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
        }

        .play-btn:disabled {
            background: #334155;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Oyun İçi HUD */
        #hud {
            display: none;
            position: absolute;
            inset: 0;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .health-container {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .health-text {
            color: white;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .health-bar {
            width: 200px;
            height: 20px;
            background: #334155;
            border-radius: 10px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: var(--danger);
            width: 100%;
            transition: width 0.2s ease-out;
        }

        .leaderboard {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            min-width: 150px;
        }
        
        .leaderboard h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: #94a3b8; text-transform: uppercase; }
        .lb-entry { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 5px; }

        .abilities {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }

        .ability-box {
            width: 60px;
            height: 60px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        .ability-box .key { font-size: 0.7rem; color: #94a3b8; margin-bottom: 2px; }
        .ability-box .name { font-size: 0.8rem; }
        
        .cooldown-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.7);
            height: 0%;
            transition: height 0.1s linear;
        }

        /* Mobil Kontroller */
        #mobile-controls {
            display: none;
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .joystick-zone {
            position: absolute;
            bottom: 20px;
            width: 150px;
            height: 150px;
            pointer-events: all;
            border-radius: 50%;
        }

        #move-zone { left: 20px; }
        #aim-zone { right: 20px; }

        .joystick-base {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: none;
        }

        .joystick-stick {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
        }

        .mobile-abilities {
            position: absolute;
            bottom: 180px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: all;
        }

        .mob-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.3);
            color: white; font-size: 0.7rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #respawn-screen {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(239, 68, 68, 0.2);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            pointer-events: all;
            z-index: 90;
        }

    </style>
</head>
<body>

                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                </svg>
                Tam Ekran
            </button>

            <div class="lobby-card">

            <div class="top-bar">

                    <div class="health-text" id="hp-text">CAN: 100</div>

                        <div class="health-fill" id="hp-fill"></div>

                    <h3>Sıralama</h3>

            <!-- PC Yetenek Barı -->
            <div class="abilities" id="pc-abilities">
                <div class="ability-box">

                </div>

                    <div class="key">E</div><div class="name">BOMBA</div>

                </div>
            </div>

        <!-- Mobil Kontroller -->
        <div id="mobile-controls">
            <div class="joystick-zone" id="move-zone">
                <div class="joystick-base" id="move-base"><div class="joystick-stick" id="move-stick"></div></div>
            </div>
            <div class="joystick-zone" id="aim-zone">
                <div class="joystick-base" id="aim-base"><div class="joystick-stick" id="aim-stick"></div></div>
            </div>
            <div class="mobile-abilities">
                <div class="mob-btn" id="mob-dash">DASH<div class="cooldown-overlay" id="mcd-dash"></div></div>
                <div class="mob-btn" id="mob-bomb">BOMBA<div class="cooldown-overlay" id="mcd-bomb"></div></div>
                <div class="mob-btn" id="mob-smoke">SİS<div class="cooldown-overlay" id="mcd-smoke"></div></div>
            </div>
        </div>
    </div>

    <!-- 3D Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Kütüphaneler -->
    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- TAM EKRAN MANTIĞI ---
        window.toggleFullScreen = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Tam ekran hatası: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        };

        // --- FIREBASE KURULUMU ---
        // Not: Bu kodun kendi sitende çalışması için alttaki firebaseConfig objesini 
        // kendi Firebase projenin ayarlarıyla değiştirmen gerekir.
        // Şimdilik test ortamının ayarlarını kullanıyor.
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
             // BURAYA KENDI FIREBASE AYARLARINI YAZABILIRSIN (Gerçek sunucu için)
             // apiKey: "...", authDomain: "...", projectId: "..."
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'voxel-arena-v1';
        
        let app, auth, db, user;

        if (firebaseConfig && Object.keys(firebaseConfig).length > 0) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (e) {
                    console.error("Auth hatası:", e);
                    document.getElementById('play-btn').innerText = "BAĞLANTI HATASI";
                }
            };
            initAuth();

            onAuthStateChanged(auth, (u) => {
                if (u) {
                    user = u;
                    document.getElementById('play-btn').innerText = "OYUNA KATIL";
                    document.getElementById('play-btn').disabled = false;
                }
            });
        } else {
            document.getElementById('play-btn').innerText = "FIREBASE AYARI GEREKLİ";
        }

        // --- OYUN DEĞİŞKENLERİ ---
        let gameState = 'LOBBY'; 
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // Three.js
        let scene, camera, renderer, raycaster;
        const mouse = new THREE.Vector2();
        const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        
        // Oyun Objeleri
        let localPlayerGroup;
        const remotePlayers = {}; 
        const projectiles = []; 
        let obstacles = [];

        // Yerel Oyuncu Durumu
        const playerState = {
            id: null,
            name: '',
            x: 0, z: 0,
            angle: 0,
            health: 100,
            score: 0,
            speed: 15,
            lastUpdate: 0,
            color: Math.random() * 0xffffff
        };

        // Yetenek Bekleme Süreleri
        const cooldowns = {
            dash: { current: 0, max: 3000 },
            bomb: { current: 0, max: 8000 },
            smoke: { current: 0, max: 10000 },
            shoot: { current: 0, max: 200 }
        };

        // Girdiler
        const keys = {};
        const joysticks = {
            move: { active: false, x: 0, y: 0, originX: 0, originY: 0, id: null },
            aim: { active: false, x: 0, y: 0, originX: 0, originY: 0, id: null }
        };
        let isShooting = false;

        // --- THREE.JS KURULUMU ---
        function init3D() {
            const canvas = document.getElementById('game-canvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            scene.fog = new THREE.Fog(0x0f172a, 30, 100);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 50, -20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 150;
            dirLight.shadow.camera.left = -50;
            dirLight.shadow.camera.right = 50;
            dirLight.shadow.camera.top = 50;
            dirLight.shadow.camera.bottom = -50;
            scene.add(dirLight);

            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.8 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const grid = new THREE.GridHelper(200, 40, 0x334155, 0x1e293b);
            grid.position.y = 0.01;
            scene.add(grid);

            createMap();

            raycaster = new THREE.Raycaster();
        }

        function createMap() {
            const boxGeo = new THREE.BoxGeometry(4, 4, 4);
            const boxMat = new THREE.MeshStandardMaterial({ color: 0x475569 });
            
            const positions = [
                [10, 10], [-10, -10], [20, -5], [-15, 15], [0, 20], [0, -20],
                [30, 30], [-30, -30], [30, -30], [-30, 30], [15, 0], [-15, 0]
            ];

            positions.forEach(pos => {
                const mesh = new THREE.Mesh(boxGeo, boxMat);
                mesh.position.set(pos[0], 2, pos[1]);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
                obstacles.push({ mesh, x: pos[0], z: pos[1], radius: 2.5 });
            });
        }

        function createPlayerMesh(colorHex) {
            const group = new THREE.Group();
            
            const bodyGeo = new THREE.BoxGeometry(2, 2, 2);
            const bodyMat = new THREE.MeshStandardMaterial({ color: colorHex });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 1;
            body.castShadow = true;
            group.add(body);

            const gunGeo = new THREE.BoxGeometry(0.6, 0.6, 2);
            const gunMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8 });
            const gun = new THREE.Mesh(gunGeo, gunMat);
            gun.position.set(0.7, 1.2, 1.5);
            gun.castShadow = true;
            group.add(gun);

            return group;
        }

        // --- GİRDİ YÖNETİMİ ---
        function setupInputs() {
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            
            window.addEventListener('mousemove', e => {
                if (gameState !== 'PLAYING' || isMobile) return;
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            window.addEventListener('mousedown', e => { if(e.button === 0 && gameState === 'PLAYING' && !isMobile) isShooting = true; });
            window.addEventListener('mouseup', e => { if(e.button === 0) isShooting = false; });

            window.addEventListener('keydown', e => {
                if (gameState !== 'PLAYING') return;
                if (e.code === 'ShiftLeft' && cooldowns.dash.current <= 0) useAbility('DASH');
                if (e.code === 'KeyE' && cooldowns.bomb.current <= 0) useAbility('BOMB');
                if (e.code === 'KeyQ' && cooldowns.smoke.current <= 0) useAbility('SMOKE');
            });

            if (isMobile) {
                const moveZone = document.getElementById('move-zone');
                const aimZone = document.getElementById('aim-zone');
                
                const handleTouchStart = (e, zoneType, baseId, stickId) => {
                    e.preventDefault();
                    const touch = e.changedTouches[0];
                    const base = document.getElementById(baseId);
                    const stick = document.getElementById(stickId);
                    
                    joysticks[zoneType].active = true;
                    joysticks[zoneType].id = touch.identifier;
                    joysticks[zoneType].originX = touch.clientX;
                    joysticks[zoneType].originY = touch.clientY;
                    
                    base.style.display = 'block';
                    base.style.left = touch.clientX + 'px';
                    base.style.top = touch.clientY + 'px';
                    stick.style.transform = `translate(-50%, -50%)`;

                    if(zoneType === 'aim') isShooting = true;
                };

                const handleTouchMove = (e, zoneType, stickId) => {
                    e.preventDefault();
                    if (!joysticks[zoneType].active) return;
                    
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        const touch = e.changedTouches[i];
                        if (touch.identifier === joysticks[zoneType].id) {
                            const dx = touch.clientX - joysticks[zoneType].originX;
                            const dy = touch.clientY - joysticks[zoneType].originY;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            const maxDist = 40;
                            
                            const angle = Math.atan2(dy, dx);
                            const moveX = Math.cos(angle) * Math.min(dist, maxDist);
                            const moveY = Math.sin(angle) * Math.min(dist, maxDist);
                            
                            document.getElementById(stickId).style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
                            
                            joysticks[zoneType].x = moveX / maxDist;
                            joysticks[zoneType].y = moveY / maxDist;
                        }
                    }
                };

                const handleTouchEnd = (e, zoneType, baseId, stickId) => {
                    e.preventDefault();
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        if (e.changedTouches[i].identifier === joysticks[zoneType].id) {
                            joysticks[zoneType].active = false;
                            joysticks[zoneType].x = 0;
                            joysticks[zoneType].y = 0;
                            document.getElementById(baseId).style.display = 'none';
                            if(zoneType === 'aim') isShooting = false;
                        }
                    }
                };

                moveZone.addEventListener('touchstart', e => handleTouchStart(e, 'move', 'move-base', 'move-stick'));
                moveZone.addEventListener('touchmove', e => handleTouchMove(e, 'move', 'move-stick'));
                moveZone.addEventListener('touchend', e => handleTouchEnd(e, 'move', 'move-base', 'move-stick'));
                moveZone.addEventListener('touchcancel', e => handleTouchEnd(e, 'move', 'move-base', 'move-stick'));

                aimZone.addEventListener('touchstart', e => handleTouchStart(e, 'aim', 'aim-base', 'aim-stick'));
                aimZone.addEventListener('touchmove', e => handleTouchMove(e, 'aim', 'aim-stick'));
                aimZone.addEventListener('touchend', e => handleTouchEnd(e, 'aim', 'aim-base', 'aim-stick'));
                aimZone.addEventListener('touchcancel', e => handleTouchEnd(e, 'aim', 'aim-base', 'aim-stick'));

                document.getElementById('mob-dash').addEventListener('touchstart', (e) => { e.preventDefault(); if(cooldowns.dash.current<=0) useAbility('DASH'); });
                document.getElementById('mob-bomb').addEventListener('touchstart', (e) => { e.preventDefault(); if(cooldowns.bomb.current<=0) useAbility('BOMB'); });
                document.getElementById('mob-smoke').addEventListener('touchstart', (e) => { e.preventDefault(); if(cooldowns.smoke.current<=0) useAbility('SMOKE'); });
            }
        }

        // --- OYUN MEKANİKLERİ ---
        function startGame() {
            if(!user) return; // Güvenlik kontrolü

            const nameInput = document.getElementById('username-input').value.trim();
            playerState.name = nameInput || `Oyuncu_${Math.floor(Math.random()*1000)}`;
            playerState.id = user.uid;
            
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('respawn-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            
            if (isMobile) {
                document.getElementById('mobile-controls').style.display = 'block';
                document.getElementById('pc-abilities').style.display = 'none';
            } else {
                document.getElementById('mobile-controls').style.display = 'none';
                document.getElementById('pc-abilities').style.display = 'flex';
            }

            playerState.x = (Math.random() - 0.5) * 80;
            playerState.z = (Math.random() - 0.5) * 80;
            playerState.health = 100;
            playerState.score = 0;

            if(!localPlayerGroup) {
                localPlayerGroup = createPlayerMesh(playerState.color);
                scene.add(localPlayerGroup);
            }
            localPlayerGroup.position.set(playerState.x, 0, playerState.z);

            gameState = 'PLAYING';
            setupMultiplayer();
        }

        window.respawn = () => { startGame(); };
        document.getElementById('play-btn').addEventListener('click', startGame);

        function useAbility(type) {
            const pX = localPlayerGroup.position.x;
            const pZ = localPlayerGroup.position.z;
            const dirX = Math.sin(localPlayerGroup.rotation.y);
            const dirZ = Math.cos(localPlayerGroup.rotation.y);

            if (type === 'DASH') {
                cooldowns.dash.current = cooldowns.dash.max;
                playerState.speed = 45;
                setTimeout(() => { playerState.speed = 15; }, 200);
            } 
            else if (type === 'BOMB') {
                cooldowns.bomb.current = cooldowns.bomb.max;
                spawnProjectile('BOMB', pX, 1, pZ, dirX, dirZ, playerState.id);
                sendActionEvent('BOMB', pX, 1, pZ, dirX, dirZ);
            }
            else if (type === 'SMOKE') {
                cooldowns.smoke.current = cooldowns.smoke.max;
                spawnProjectile('SMOKE', pX, 1, pZ, dirX, dirZ, playerState.id);
                sendActionEvent('SMOKE', pX, 1, pZ, dirX, dirZ);
            }
        }

        function shoot() {
            if (cooldowns.shoot.current > 0) return;
            cooldowns.shoot.current = cooldowns.shoot.max;

            const pX = localPlayerGroup.position.x;
            const pZ = localPlayerGroup.position.z;
            const dirX = Math.sin(localPlayerGroup.rotation.y);
            const dirZ = Math.cos(localPlayerGroup.rotation.y);
            
            spawnProjectile('BULLET', pX + dirX*2, 1.2, pZ + dirZ*2, dirX, dirZ, playerState.id);
            sendActionEvent('BULLET', pX + dirX*2, 1.2, pZ + dirZ*2, dirX, dirZ);
        }

        function spawnProjectile(type, x, y, z, dirX, dirZ, ownerId) {
            let mesh, speed = 0, gravity = 0, life = 0;

            if (type === 'BULLET') {
                mesh = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
                speed = 60; life = 2000;
            } else if (type === 'BOMB') {
                mesh = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshStandardMaterial({color: 0xef4444}));
                speed = 20; gravity = 30; life = 1500; 
            } else if (type === 'SMOKE') {
                mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 1), new THREE.MeshStandardMaterial({color: 0x94a3b8}));
                speed = 15; gravity = 30; life = 1000;
            }

            mesh.position.set(x, y, z);
            scene.add(mesh);

            projectiles.push({
                type, mesh, ownerId,
                vx: dirX * speed, vy: (type === 'BOMB' || type === 'SMOKE') ? 10 : 0, vz: dirZ * speed,
                gravity, spawnTime: Date.now(), life, active: true
            });
        }

        function createExplosion(x, z, color, radius, duration, isSmoke = false) {
            const geo = new THREE.SphereGeometry(radius, 16, 16);
            const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 1, z);
            scene.add(mesh);

            projectiles.push({
                type: 'EFFECT', mesh, spawnTime: Date.now(), life: duration,
                scaleSpeed: isSmoke ? 0 : -0.5 
            });
        }

        // --- MULTIPLAYER ---
        let unsubscribePlayers = null;
        let unsubscribeEvents = null;

        function setupMultiplayer() {
            if (!user) return;
            const playersRef = collection(db, 'artifacts', appId, 'public', 'data', 'voxel_players');
            const eventsRef = collection(db, 'artifacts', appId, 'public', 'data', 'voxel_events');

            updateLocalPlayerDoc();

            if (!unsubscribePlayers) {
                unsubscribePlayers = onSnapshot(playersRef, (snap) => {
                    snap.docChanges().forEach(change => {
                        const data = change.doc.data();
                        const id = change.doc.id;

                        if (id === user.uid) return;

                        if (change.type === 'added' || change.type === 'modified') {
                            if (!remotePlayers[id]) {
                                const group = createPlayerMesh(data.color || 0xff0000);
                                scene.add(group);
                                
                                const label = document.createElement('div');
                                label.style.position = 'absolute';
                                label.style.color = 'white';
                                label.style.fontSize = '12px';
                                label.style.fontWeight = 'bold';
                                label.style.textShadow = '1px 1px 2px black';
                                label.style.pointerEvents = 'none';
                                label.innerText = data.name;
                                document.body.appendChild(label);

                                remotePlayers[id] = { group, label, health: data.health };
                            }
                            remotePlayers[id].targetPos = new THREE.Vector3(data.x, 0, data.z);
                            remotePlayers[id].targetRot = data.angle;
                            remotePlayers[id].health = data.health;
                            remotePlayers[id].score = data.score;
                            remotePlayers[id].lastUpdate = Date.now();
                        }
                        if (change.type === 'removed') {
                            removeRemotePlayer(id);
                        }
                    });
                    updateLeaderboard();
                }, (err) => console.error("Oyuncu dinleme hatası", err));

                unsubscribeEvents = onSnapshot(eventsRef, (snap) => {
                    snap.docChanges().forEach(change => {
                        if (change.type === 'added') {
                            const data = change.doc.data();
                            if (data.ownerId !== user.uid && Date.now() - data.timestamp < 2000) {
                                spawnProjectile(data.type, data.x, data.y, data.z, data.dirX, data.dirZ, data.ownerId);
                            }
                        }
                    });
                }, (err) => console.error("Olay dinleme hatası", err));
            }
        }

        function removeRemotePlayer(id) {
            if (remotePlayers[id]) {
                scene.remove(remotePlayers[id].group);
                if(remotePlayers[id].label) remotePlayers[id].label.remove();
                delete remotePlayers[id];
            }
        }

        function updateLocalPlayerDoc() {
            if (!user || gameState !== 'PLAYING') return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'voxel_players', user.uid);
            setDoc(docRef, {
                name: playerState.name,
                x: localPlayerGroup.position.x,
                z: localPlayerGroup.position.z,
                angle: localPlayerGroup.rotation.y,
                health: playerState.health,
                score: playerState.score,
                color: playerState.color,
                timestamp: Date.now()
            }).catch(e => console.error(e));
        }

        function sendActionEvent(type, x, y, z, dirX, dirZ) {
            if (!user) return;
            const eventId = user.uid + '_' + Date.now();
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'voxel_events', eventId);
            setDoc(docRef, {
                type, x, y, z, dirX, dirZ, ownerId: user.uid, timestamp: Date.now()
            }).catch(e => console.error(e));
            setTimeout(() => deleteDoc(docRef).catch(()=>Object), 5000);
        }

        function takeDamage(amount, attackerId) {
            if (gameState !== 'PLAYING') return;
            playerState.health -= amount;
            if (playerState.health <= 0) {
                playerState.health = 0;
                die(attackerId);
            }
            updateLocalPlayerDoc();
        }

        function die(killerId) {
            gameState = 'DEAD';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('mobile-controls').style.display = 'none';
            document.getElementById('respawn-screen').style.display = 'flex';
            
            if(localPlayerGroup) {
                scene.remove(localPlayerGroup);
                localPlayerGroup = null;
            }

            if (killerId && killerId !== user.uid) {
                const killerDoc = doc(db, 'artifacts', appId, 'public', 'data', 'voxel_players', killerId);
                getDoc(killerDoc).then(d => {
                    if(d.exists()) updateDoc(killerDoc, { score: (d.data().score || 0) + 100 });
                }).catch(e => console.error(e));
            }
        }

        function updateLeaderboard() {
            const list = [{name: playerState.name, score: playerState.score}];
            Object.values(remotePlayers).forEach(p => {
                list.push({name: p.label.innerText, score: p.score || 0});
            });
            list.sort((a,b) => b.score - a.score);
            
            const html = list.slice(0,5).map((l, i) => 
                `<div class="lb-entry"><span>${i+1}. ${l.name}</span><span>${l.score}</span></div>`
            ).join('');
            document.getElementById('lb-content').innerHTML = html;
        }

        // --- ANA OYUN DÖNGÜSÜ ---
        const clock = new THREE.Clock();

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            const dt = Math.min(clock.getDelta(), 0.1);

            if (gameState === 'PLAYING' && localPlayerGroup) {
                // HAREKET
                let moveX = 0; let moveZ = 0;

                if (!isMobile) {
                    if (keys['KeyW']) moveZ -= 1;
                    if (keys['KeyS']) moveZ += 1;
                    if (keys['KeyA']) moveX -= 1;
                    if (keys['KeyD']) moveX += 1;
                } else {
                    moveX = joysticks.move.x;
                    moveZ = joysticks.move.y;
                }

                if (moveX !== 0 || moveZ !== 0) {
                    const len = Math.sqrt(moveX*moveX + moveZ*moveZ);
                    moveX /= len; moveZ /= len;
                    
                    const nx = localPlayerGroup.position.x + moveX * playerState.speed * dt;
                    const nz = localPlayerGroup.position.z + moveZ * playerState.speed * dt;
                    
                    let canMoveX = nx > -98 && nx < 98;
                    let canMoveZ = nz > -98 && nz < 98;

                    obstacles.forEach(obs => {
                        if (Math.abs(nx - obs.x) < obs.radius + 1 && Math.abs(localPlayerGroup.position.z - obs.z) < obs.radius + 1) canMoveX = false;
                        if (Math.abs(localPlayerGroup.position.x - obs.x) < obs.radius + 1 && Math.abs(nz - obs.z) < obs.radius + 1) canMoveZ = false;
                    });

                    if (canMoveX) localPlayerGroup.position.x = nx;
                    if (canMoveZ) localPlayerGroup.position.z = nz;
                }

                // NİŞAN ALMA
                if (!isMobile) {
                    raycaster.setFromCamera(mouse, camera);
                    const target = new THREE.Vector3();
                    raycaster.ray.intersectPlane(groundPlane, target);
                    localPlayerGroup.lookAt(target.x, localPlayerGroup.position.y, target.z);
                } else {
                    if (joysticks.aim.x !== 0 || joysticks.aim.y !== 0) {
                        localPlayerGroup.rotation.y = Math.atan2(joysticks.aim.x, joysticks.aim.y);
                    } else if (moveX !== 0 || moveZ !== 0) {
                        localPlayerGroup.rotation.y = Math.atan2(moveX, moveZ);
                    }
                }

                if (isShooting) shoot();

                // KAMERA TAKİBİ
                camera.position.x = localPlayerGroup.position.x;
                camera.position.y = 25; 
                camera.position.z = localPlayerGroup.position.z + 20; 
                camera.lookAt(localPlayerGroup.position);

                // FIREBASE GÜNCELLEME 
                if (Date.now() - playerState.lastUpdate > 100) {
                    updateLocalPlayerDoc();
                    playerState.lastUpdate = Date.now();
                }

                // HUD GÜNCELLEME
                document.getElementById('hp-fill').style.width = playerState.health + '%';
                document.getElementById('hp-text').innerText = `CAN: ${Math.floor(playerState.health)}`;
                
                for (let key in cooldowns) {
                    if (cooldowns[key].current > 0) {
                        cooldowns[key].current -= dt * 1000;
                        const pct = (cooldowns[key].current / cooldowns[key].max) * 100;
                        const el = document.getElementById(isMobile ? `mcd-${key}` : `cd-${key}`);
                        if(el) el.style.height = `${pct}%`;
                    }
                }
            }

            // DİĞER OYUNCULARI HAREKET ETTİR
            Object.values(remotePlayers).forEach(p => {
                if (p.targetPos) {
                    p.group.position.lerp(p.targetPos, 0.2); 
                    const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), p.targetRot);
                    p.group.quaternion.slerp(q, 0.2);

                    if (p.label) {
                        const tempV = p.group.position.clone();
                        tempV.y += 3; 
                        tempV.project(camera);
                        const x = (tempV.x * .5 + .5) * window.innerWidth;
                        const y = (tempV.y * -.5 + .5) * window.innerHeight;
                        p.label.style.transform = `translate(-50%, -50%)`;
                        p.label.style.left = `${x}px`;
                        p.label.style.top = `${y}px`;
                        p.label.style.display = tempV.z > 1 ? 'none' : 'block';
                    }
                }
            });

            // MERMİLER VE EFEKTLER
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                if (!p.active) continue;

                if (p.type === 'EFFECT') {
                    p.life -= dt * 1000;
                    if (p.scaleSpeed !== 0) {
                        const scale = Math.max(0.1, 1 + (p.life / 1000) * p.scaleSpeed); 
                        p.mesh.scale.set(scale, scale, scale);
                    }
                    if (p.life <= 0) {
                        scene.remove(p.mesh);
                        projectiles.splice(i, 1);
                    }
                    continue;
                }

                p.mesh.position.x += p.vx * dt;
                p.mesh.position.y += p.vy * dt;
                p.mesh.position.z += p.vz * dt;

                if (p.gravity > 0) p.vy -= p.gravity * dt;

                if (p.mesh.position.y <= 0.5 && (p.type === 'BOMB' || p.type === 'SMOKE')) {
                    p.mesh.position.y = 0.5;
                    p.vx = 0; p.vz = 0; p.vy = 0; 
                }

                p.life -= dt * 1000;

                let hit = false;
                if (p.type === 'BULLET') {
                    for (let obs of obstacles) {
                        if (Math.abs(p.mesh.position.x - obs.x) < obs.radius && Math.abs(p.mesh.position.z - obs.z) < obs.radius) {
                            hit = true; break;
                        }
                    }
                    if (!hit && p.ownerId !== user?.uid && gameState === 'PLAYING') {
                        const dist = p.mesh.position.distanceTo(localPlayerGroup.position);
                        if (dist < 2) {
                            takeDamage(10, p.ownerId);
                            hit = true;
                        }
                    }
                }

                if (p.life <= 0 || hit) {
                    if (p.type === 'BOMB' && !hit) {
                        createExplosion(p.mesh.position.x, p.mesh.position.z, 0xff5500, 8, 500, false);
                        if (gameState === 'PLAYING' && p.ownerId !== user?.uid) {
                            const dist = new THREE.Vector3(p.mesh.position.x, 0, p.mesh.position.z).distanceTo(localPlayerGroup.position);
                            if (dist < 8) takeDamage(40, p.ownerId);
                        }
                    } else if (p.type === 'SMOKE' && !hit) {
                        createExplosion(p.mesh.position.x, p.mesh.position.z, 0x888888, 12, 5000, true);
                    }

                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // --- BAŞLATMA ---
        init3D();
        setupInputs();
        // Pencere yüklendiğinde oyun döngüsünü başlat
        window.onload = function() {
            gameLoop();
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
