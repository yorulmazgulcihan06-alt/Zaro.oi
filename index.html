<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZARO.IO | 3D Voxel War</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }
        canvas { display: block; }

        /* LOBİ TASARIMI */
        #lobby {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8) url('https://wallpaperaccess.com/full/1510565.jpg') no-repeat center center;
            background-size: cover; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .ui-box {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 20px; border: 2px solid #fff; text-align: center; color: white;
        }
        input { padding: 15px; width: 250px; border-radius: 10px; border: none; margin-bottom: 20px; font-size: 18px; }
        button { 
            padding: 15px 40px; font-size: 20px; cursor: pointer; border-radius: 10px; border: none;
            background: #ff4757; color: white; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #ff6b81; transform: scale(1.1); }

        /* OYUN İÇİ ARAYÜZ */
        #hud { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%);
        }
        #fullscreen-btn {
            position: absolute; top: 20px; right: 20px; pointer-events: auto;
            background: rgba(0,0,0,0.5); color: white; border: 1px solid white; padding: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="ui-box">
            <h1>ZARO.IO</h1>
            <input type="text" id="username" placeholder="Oyuncu Adı...">
            <br>
            <button onclick="startGame()">SAVAŞA BAŞLA</button>
            <p id="device-info" style="font-size: 12px; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="hud">
        <div id="crosshair"></div>
        <button id="fullscreen-btn" onclick="toggleFullScreen()">TAM EKRAN</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, weapon;
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        document.getElementById('device-info').innerText = isMobile ? "Mobil Cihaz Tespit Edildi (Dokunmatik Aktif)" : "PC Tespit Edildi (WASD + Mouse)";

        function init() {
            // 1. SAHNE VE KAMERA
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Gelişmiş Gökyüzü Rengi
            scene.fog = new THREE.Fog(0x87ceeb, 0, 100); // Sis efekti

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // 2. IŞIKLANDIRMA (DETAYLI)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); 
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(10, 50, 10);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            scene.add(sunLight);

            // 3. DÜNYA (EV VE ZEMİN)
            // Zemin
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshStandardMaterial({ color: 0x44aa44 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Örnek Bir Ev (Voxel Tarzı)
            const house = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(5, 4, 5), new THREE.MeshStandardMaterial({color: 0x8b4513}));
            body.position.y = 2;
            body.castShadow = true;
            const roof = new THREE.Mesh(new THREE.ConeGeometry(4, 3, 4), new THREE.MeshStandardMaterial({color: 0xff0000}));
            roof.position.y = 5.5;
            roof.rotation.y = Math.PI / 4;
            house.add(body, roof);
            house.position.set(0, 0, -10);
            scene.add(house);

            // 4. SİLAH (DETAYLI)
            weapon = new THREE.Group();
            const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.5), new THREE.MeshStandardMaterial({color: 0x222222}));
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.4), new THREE.MeshStandardMaterial({color: 0x111111}));
            barrel.rotation.x = Math.PI / 2;
            barrel.position.z = -0.3;
            weapon.add(gunBody, barrel);
            camera.add(weapon);
            weapon.position.set(0.3, -0.25, -0.5);
            scene.add(camera);

            // 5. KONTROLLER
            controls = new PointerLockControls(camera, document.body);
            
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Silahın nefes alma efekti (Yumuşak hareket)
            if(controls.isLocked) {
                weapon.position.y = -0.25 + Math.sin(Date.now() * 0.005) * 0.005;
            }
            
            renderer.render(scene, camera);
        }

        // Buton Fonksiyonları
        window.startGame = function() {
            const name = document.getElementById('username').value;
            if(name.length < 2) { alert("Lütfen bir isim gir!"); return; }
            
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            
            if(!isMobile) {
                controls.lock();
            }
        }

        window.toggleFullScreen = function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
    </script>
</body>
</html>
