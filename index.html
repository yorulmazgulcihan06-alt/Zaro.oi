```html
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voxel Arena - Mobil & PC</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0f172a; font-family: sans-serif; user-select: none; touch-action: none; }
        #game-canvas { display: block; width: 100%; height: 100%; }
        
        #ui { position: absolute; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        #lobby { 
            background: rgba(15, 23, 42, 0.95); padding: 30px; border-radius: 20px; 
            text-align: center; pointer-events: all; border: 2px solid #4f46e5; width: 80%; max-width: 300px;
        }
        
        input { 
            padding: 12px; border-radius: 8px; border: 1px solid #4f46e5; width: 90%; 
            margin-bottom: 20px; background: #1e293b; color: white; font-size: 16px; text-align: center;
        }
        
        button { 
            padding: 15px 40px; border-radius: 10px; border: none; 
            background: #4f46e5; color: white; font-weight: bold; cursor: pointer; font-size: 18px; width: 100%;
        }

        #hud { position: absolute; top: 20px; left: 20px; color: white; display: none; pointer-events: none; font-weight: bold; text-shadow: 1px 1px 2px black; }

        /* Mobil Kontroller */
        .joystick-container {
            position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: all; display: none;
        }
        .joystick-stick {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%);
        }
        #fire-zone {
            position: absolute; bottom: 40px; right: 40px; width: 100px; height: 100px;
            background: rgba(239, 68, 68, 0.4); border-radius: 50%; pointer-events: all;
            display: none; align-items: center; justify-content: center; color: white; font-weight: bold;
            border: 2px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="lobby">
            <h1 style="color: white; margin-top: 0; font-size: 24px;">VOXEL ARENA</h1>
            <input type="text" id="nick" placeholder="İsmini Yaz..." maxlength="10">
            <button id="start-btn">OYUNA BAŞLA</button>
        </div>
        <div id="hud">CAN: 100 | SKOR: 0</div>
        
        <!-- Mobil Görsel Kontroller -->
        <div id="move-joy" class="joystick-container">
            <div id="stick" class="joystick-stick"></div>
        </div>
        <div id="fire-zone">ATEŞ</div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSkMiVSxFwXmJLcSPxrAWu-bBoImAgrzo",
            authDomain: "voxel-feb43.firebaseapp.com",
            projectId: "voxel-feb43",
            storageBucket: "voxel-feb43.firebasestorage.app",
            messagingSenderId: "604626773313",
            appId: "1:604626773313:web:6e855ff7191a2612c76dc0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let scene, camera, renderer, player;
        let userId = null;
        const enemies = {};
        const keys = {};
        const isMobile = 'ontouchstart' in window;
        let moveData = { x: 0, y: 0 };
        let projectiles = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(10, 20, 10);
            scene.add(light);

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x1e293b }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);
            scene.add(new THREE.GridHelper(100, 40, 0x4f46e5, 0x1e293b));

            animate();
        }

        function createBox(color, name) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color }));
            body.position.y = 0.5;
            g.add(body);
            
            // Basit silah ucu
            const gun = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.7), new THREE.MeshStandardMaterial({ color: 0x000000 }));
            gun.position.set(0, 0.6, 0.5);
            g.add(gun);
            
            return g;
        }

        document.getElementById('start-btn').onclick = async () => {
            const nick = document.getElementById('nick').value || "Oyuncu";
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            if(isMobile) {
                document.getElementById('move-joy').style.display = 'block';
                document.getElementById('fire-zone').style.display = 'flex';
            }

            const cred = await signInAnonymously(auth);
            userId = cred.user.uid;

            player = createBox(0x4f46e5, nick);
            scene.add(player);

            onSnapshot(collection(db, "players"), (snap) => {
                snap.docChanges().forEach(change => {
                    const id = change.doc.id;
                    const d = change.doc.data();
                    if(id === userId) return;
                    if(change.type === "added" || change.type === "modified") {
                        if(!enemies[id]) {
                            enemies[id] = createBox(0xef4444, d.n);
                            scene.add(enemies[id]);
                        }
                        enemies[id].position.set(d.x, 0, d.z);
                        enemies[id].rotation.y = d.r || 0;
                    } else if(change.type === "removed") {
                        if(enemies[id]) { scene.remove(enemies[id]); delete enemies[id]; }
                    }
                });
            });
        };

        // Ateş Etme
        function fire() {
            if(!player) return;
            const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            bullet.position.copy(player.position);
            bullet.position.y = 0.6;
            const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(player.quaternion);
            scene.add(bullet);
            projectiles.push({ mesh: bullet, dir: dir, life: 100 });
        }

        // Joystick Mantığı
        if(isMobile) {
            const joy = document.getElementById('move-joy');
            const stick = document.getElementById('stick');
            joy.ontouchmove = (e) => {
                const touch = e.touches[0];
                const rect = joy.getBoundingClientRect();
                const cx = rect.left + rect.width/2;
                const cy = rect.top + rect.height/2;
                let dx = touch.clientX - cx;
                let dy = touch.clientY - cy;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                const angle = Math.atan2(dy, dx);
                dx = Math.cos(angle) * dist;
                dy = Math.sin(angle) * dist;
                stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                moveData = { x: dx/50, y: dy/50 };
            };
            joy.ontouchend = () => {
                stick.style.transform = `translate(-50%, -50%)`;
                moveData = { x: 0, y: 0 };
            };
            document.getElementById('fire-zone').ontouchstart = (e) => { e.preventDefault(); fire(); };
        }

        function animate() {
            requestAnimationFrame(animate);
            if(player) {
                // Hareket Kontrolü
                let vx = 0, vz = 0;
                if(isMobile) {
                    vx = moveData.x * 0.15;
                    vz = moveData.y * 0.15;
                } else {
                    if(keys['w'] || keys['W']) vz = -0.15;
                    if(keys['s'] || keys['S']) vz = 0.15;
                    if(keys['a'] || keys['A']) vx = -0.15;
                    if(keys['d'] || keys['D']) vx = 0.15;
                }
                player.position.x += vx;
                player.position.z += vz;

                // Bakış yönü
                if(vx !== 0 || vz !== 0) {
                    player.rotation.y = Math.atan2(vx, vz);
                }

                camera.position.lerp(new THREE.Vector3(player.position.x, 12, player.position.z + 10), 0.1);
                camera.lookAt(player.position);

                if(Math.random() > 0.8) {
                    setDoc(doc(db, "players", userId), { x: player.position.x, z: player.position.z, r: player.rotation.y }, { merge: true });
                }
            }

            // Mermi fiziği
            projectiles.forEach((p, index) => {
                p.mesh.position.addScaledVector(p.dir, 0.4);
                p.life--;
                if(p.life <= 0) {
                    scene.remove(p.mesh);
                    projectiles.splice(index, 1);
                }
            });

            renderer.render(scene, camera);
        }

        window.onkeydown = (e) => { keys[e.key] = true; if(e.code === 'Space') fire(); };
        window.onkeyup = (e) => keys[e.key] = false;
        window.onmousedown = (e) => { if(gameState === 'PLAYING') fire(); };
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };

        let gameState = 'LOBBY';
        document.getElementById('start-btn').addEventListener('click', () => gameState = 'PLAYING');

        init();
    </script>
</body>
</html>
