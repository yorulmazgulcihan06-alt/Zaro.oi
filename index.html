<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZARO.IO | Online Savaş</title>
    <style>
        :root { --gold: #ffd700; --red: #ff4757; --blue: #2e86de; }
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; color: white; }
        
        /* GİRİŞ EKRANI - CİHAZ SEÇİMİ */
        #setup-screen {
            position: absolute; width: 100%; height: 100%; z-index: 100;
            background: #121212; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* LOBİ VE MARKET */
        #lobby {
            position: absolute; width: 100%; height: 100%; z-index: 50;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        .window {
            background: #222; border: 2px solid var(--gold); padding: 30px; border-radius: 15px;
            text-align: center; width: 320px; margin: 10px;
        }

        .btn {
            padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer;
            font-weight: bold; margin: 10px; transition: 0.3s;
        }
        .btn-pc { background: var(--blue); color: white; }
        .btn-mobile { background: var(--red); color: white; }
        .btn-play { background: #2ecc71; color: white; width: 100%; font-size: 20px; }

        /* MARKET VE ENVANTER */
        .item-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .slot { width: 100%; aspect-ratio: 1; background: #333; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .unlocked { border-color: var(--gold); background: #444; }

        /* HUD */
        #hud { display: none; position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 15px; height: 15px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }

        /* ADMİN GİRİŞİ */
        #admin-input { position: absolute; bottom: 10px; right: 10px; opacity: 0.5; background: none; border: 1px solid #444; color: #444; padding: 5px; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>ZARO.IO</h1>
        <h3>Oynadığın Cihazı Seç:</h3>
        <div>
            <button class="btn btn-pc" onclick="selectDevice('pc')">💻 BİLGİSAYAR (Online)</button>
            <button class="btn btn-mobile" onclick="selectDevice('mobile')">📱 TELEFON (Online)</button>
        </div>
        <button class="btn" style="background:#555" onclick="selectDevice('offline')">🌐 ÇEVRİMDIŞI OYNA</button>
    </div>

    <div id="lobby">
        <div class="window">
            <h2 id="lobby-title">LOBİ</h2>
            <input type="text" id="username" placeholder="Nick Yaz..." style="padding:10px; width:80%; margin-bottom:10px;">
            
            <div class="item-grid">
                <div class="slot" id="s1">🔫</div>
                <div class="slot" id="s2">💣</div>
                <div class="slot" id="s3">🗡️</div>
                <div class="slot" id="s4">🛡️</div>
                <div class="slot" id="s5">✨</div>
                <div class="slot" id="s6">💎</div>
            </div>

            <button class="btn btn-play" onclick="startBattle()">SAVAŞA BAŞLA</button>
            <div style="display:flex; justify-content: space-between;">
                <button onclick="alert('Arkadaşlık İsteği Gönderildi')" style="background:none; color:var(--blue); border:none; cursor:pointer;">+ Arkadaş Ekle</button>
                <button onclick="alert('Sandık Açılıyor...')" style="background:none; color:var(--gold); border:none; cursor:pointer;">🎁 Sandık Aç</button>
            </div>
        </div>
        <input type="password" id="admin-input" placeholder="Kod..." oninput="checkAdmin(this.value)">
    </div>

    <div id="hud">
        <div style="font-size: 24px;">❤️ 100 | ⚡ 2-6 OYUNCU</div>
    </div>
    <div id="crosshair" style="display:none"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, deviceType, weapon;
        let isGameRunning = false;

        // Cihaz Seçimi
        window.selectDevice = (type) => {
            deviceType = type;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('lobby').style.display = 'flex';
            document.getElementById('lobby-title').innerText = type.toUpperCase() + " LOBİSİ";
        };

        // Admin Kodu Kontrolü
        window.checkAdmin = (val) => {
            if(val === 'admin5656') {
                alert("ADMIN YETKİSİ ALINDI! Her şey bedava.");
                document.querySelectorAll('.slot').forEach(s => {
                    s.classList.add('unlocked');
                    s.style.backgroundColor = "#1e3799";
                });
            }
        };

        // Savaşı Başlat
        window.startBattle = () => {
            const nick = document.getElementById('username').value;
            if(!nick) return alert("Nick girmelisin!");
            
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            
            initGame();
        };

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Gök mavisi
            scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // IŞIKLAR
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(10, 50, 20);
            sun.castShadow = true;
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x404040, 0.6));

            // ZEMİN (İstediğin yer zemini)
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // DETAYLI SİLAH
            weapon = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.6), new THREE.MeshStandardMaterial({color: 0x222222}));
            const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5), new THREE.MeshStandardMaterial({color: 0x000}));
            pipe.rotation.x = Math.PI / 2; pipe.position.z = -0.3;
            weapon.add(body, pipe);
            camera.add(weapon);
            weapon.position.set(0.3, -0.2, -0.5);
            scene.add(camera);

            isGameRunning = true;
            animate();
        }

        function animate() {
            if(!isGameRunning) return;
            requestAnimationFrame(animate);
            
            // Silah sallanma efekti
            weapon.position.y = -0.2 + Math.sin(Date.now() * 0.003) * 0.005;
            weapon.position.x = 0.3 + Math.cos(Date.now() * 0.002) * 0.003;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(!renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
